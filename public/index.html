<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0B0E17">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Ne Kadar Kaldı?</title>
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --bg-deep:#0B0E17;
    --bg-glass:rgba(23,29,44,.55);
    --bg-glass-solid:#171D2C;
    --text:#F3F4F8;
    --text-dim:#8B92A8;
    --accent:#F2A65A;
    --accent-2:#3FA796;
    --border:rgba(255,255,255,.08);
    --border-strong:rgba(242,166,90,.4);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;
    min-height:100vh;
    background:var(--bg-deep);
    color:var(--text);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    overscroll-behavior:none;
  }
  body{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:calc(28px + env(safe-area-inset-top)) 18px calc(50px + env(safe-area-inset-bottom));
    overflow-x:hidden;
    animation:fadeIn .5s ease;
  }
  @keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  body::before{
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse 600px 400px at 50% -10%, rgba(242,166,90,.16), transparent 60%),
      radial-gradient(ellipse 500px 500px at 90% 90%, rgba(63,167,150,.12), transparent 60%),
      var(--bg-deep);
    z-index:-2;
  }
  body::after{
    content:'';
    position:fixed; inset:0;
    background-image: radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px);
    background-size:26px 26px;
    z-index:-1;
    mask-image: radial-gradient(ellipse 700px 500px at 50% 30%, black, transparent 75%);
  }

  .brand{
    font-family:'Space Grotesk',sans-serif;
    font-size:12px;
    font-weight:700;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:8px;
    display:flex; align-items:center; gap:8px;
  }
  .brand .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:27px;
    margin:0 0 32px;
    font-weight:700;
    text-align:center;
    letter-spacing:-.3px;
  }

  .card{
    width:100%;
    max-width:420px;
    background:var(--bg-glass);
    backdrop-filter:blur(24px) saturate(140%);
    -webkit-backdrop-filter:blur(24px) saturate(140%);
    border:1px solid var(--border);
    border-radius:26px;
    padding:32px 22px;
    box-shadow:0 20px 60px -20px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.04);
  }

  .chip-label{
    font-size:11px;
    font-weight:600;
    color:var(--text-dim);
    letter-spacing:1.2px;
    text-transform:uppercase;
    margin:0 0 10px 2px;
  }
  .chip-row{
    display:flex;
    gap:8px;
    margin-bottom:22px;
  }
  .chip{
    flex:1;
    padding:11px 6px;
    text-align:center;
    border:1px solid var(--border);
    border-radius:30px;
    cursor:pointer;
    font-size:13px;
    font-weight:600;
    color:var(--text-dim);
    background:rgba(255,255,255,.02);
    transition:all .18s ease;
  }
  .chip.selected{
    border-color:var(--border-strong);
    color:var(--accent);
    background:rgba(242,166,90,.1);
    box-shadow:0 0 0 1px rgba(242,166,90,.15);
  }

  .pulse-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin:14px 0 6px;
  }
  .pulse-btn{
    position:relative;
    width:148px;
    height:148px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    background:radial-gradient(circle at 35% 30%, #FFC98A, var(--accent) 60%, #D9873C 100%);
    box-shadow:0 12px 32px -8px rgba(242,166,90,.55), inset 0 2px 4px rgba(255,255,255,.35);
    display:flex; align-items:center; justify-content:center;
    transition:transform .15s ease;
  }
  .pulse-btn:active{transform:scale(.96);}
  .pulse-btn:disabled{opacity:.6; cursor:default;}
  .pulse-btn .icon{font-size:44px; filter:drop-shadow(0 2px 4px rgba(0,0,0,.25));}
  .pulse-ring{
    position:absolute; inset:0;
    border-radius:50%;
    border:2px solid rgba(242,166,90,.55);
    animation:ringPulse 2.4s cubic-bezier(.2,.6,.4,1) infinite;
  }
  .pulse-ring.d2{animation-delay:.8s;}
  .pulse-ring.d3{animation-delay:1.6s;}
  @keyframes ringPulse{
    0%{transform:scale(1); opacity:.7;}
    100%{transform:scale(1.7); opacity:0;}
  }
  .btn-caption{
    margin-top:18px;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:16px;
    letter-spacing:.2px;
  }
  .btn-sub{
    margin-top:4px;
    font-size:12.5px;
    color:var(--text-dim);
  }

  .share-box{
    margin-top:26px;
    padding:20px;
    background:rgba(0,0,0,.2);
    border:1px solid var(--border);
    border-radius:18px;
  }
  .live-badge{
    display:inline-flex; align-items:center; gap:6px;
    font-size:11px; font-weight:700; letter-spacing:1px;
    color:var(--accent-2);
    text-transform:uppercase;
    margin-bottom:12px;
  }
  .live-badge .dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--accent-2);
    animation:blink 1.4s ease-in-out infinite;
  }
  @keyframes blink{0%,100%{opacity:1;} 50%{opacity:.3;}}
  .share-link{
    font-size:12.5px;
    color:var(--text-dim);
    word-break:break-all;
    margin-bottom:14px;
    font-family:monospace;
  }
  .whatsapp-btn{
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%;
    padding:15px;
    background:linear-gradient(135deg,#2FE07A,#1FAE60);
    color:#06210F;
    font-weight:700;
    border-radius:14px;
    text-decoration:none;
    font-size:15px;
    box-shadow:0 8px 20px -6px rgba(47,224,122,.4);
  }
  .status-text{
    text-align:center;
    color:var(--text-dim);
    font-size:12.5px;
    margin-top:16px;
  }

  .map-wrap{
    width:100%;
    height:280px;
    border-radius:18px;
    overflow:hidden;
    margin-bottom:22px;
    border:1px solid var(--border);
    position:relative;
    filter: invert(0.93) hue-rotate(180deg) brightness(1.05) contrast(0.92);
  }
  #map{width:100%; height:100%;}
  .metrics{
    display:flex;
    gap:12px;
    margin-bottom:20px;
  }
  .metric{
    flex:1;
    background:rgba(0,0,0,.2);
    border:1px solid var(--border);
    border-radius:16px;
    padding:18px 10px;
    text-align:center;
  }
  .metric .big{
    font-family:'Space Grotesk',sans-serif;
    font-size:25px;
    font-weight:700;
    color:var(--accent);
  }
  .metric .small{
    font-size:11px;
    color:var(--text-dim);
    margin-top:5px;
    text-transform:uppercase;
    letter-spacing:.5px;
  }
  .route-btn{
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%;
    padding:16px;
    background:rgba(242,166,90,.1);
    border:1px solid var(--border-strong);
    color:var(--accent);
    font-weight:700;
    border-radius:16px;
    text-decoration:none;
    font-size:14.5px;
  }
  .center-msg{
    text-align:center;
    color:var(--text-dim);
    padding:30px 6px 10px;
    line-height:1.7;
    font-size:14.5px;
  }
  .permission-btn{
    width:100%;
    padding:18px;
    font-size:15.5px;
    font-weight:700;
    color:#06231F;
    background:linear-gradient(135deg,#5FD9C6,var(--accent-2));
    border:none;
    border-radius:16px;
    cursor:pointer;
    margin-top:18px;
    box-shadow:0 10px 24px -8px rgba(63,167,150,.4);
  }
</style>
</head>
<body>

<div class="brand"><span class="dot"></span>Canlı Takip</div>
<h1 id="pageTitle">Ne Kadar Kaldı?</h1>

<div class="card" id="app"></div>

<script>
function fmtDistance(m) {
  if (m == null) return '—';
  if (m < 1000) return Math.round(m) + ' m';
  return (m/1000).toFixed(1) + ' km';
}
function fmtEta(min) {
  if (min == null) return '—';
  if (min < 1) return '<1 dk';
  return Math.round(min) + ' dk';
}

const params = new URLSearchParams(location.search);
const code = params.get('kod');

if (code) {
  renderWaiting(code);
} else {
  renderSender();
}

function renderSender() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="chip-label">Ulaşım şekli</div>
    <div class="chip-row" id="modeRow">
      <div class="chip selected" data-mode="araba">🚗 Araba</div>
      <div class="chip" data-mode="yaya">🚶 Yaya</div>
    </div>

    <div class="chip-label">Süre</div>
    <div class="chip-row" id="durRow">
      <div class="chip selected" data-dur="15">15 dk</div>
      <div class="chip" data-dur="60">1 saat</div>
      <div class="chip" data-dur="600">10 saat</div>
    </div>

    <div class="pulse-wrap">
      <button class="pulse-btn" id="sendBtn">
        <span class="pulse-ring"></span>
        <span class="pulse-ring d2"></span>
        <span class="pulse-ring d3"></span>
        <span class="icon">📍</span>
      </button>
      <div class="btn-caption">Canlı Konum Gönder</div>
      <div class="btn-sub">Dokun ve paylaşımı başlat</div>
    </div>

    <div class="share-box" id="shareBox" style="display:none;">
      <div class="live-badge"><span class="dot"></span>Yayında</div>
      <div class="share-link" id="shareLink"></div>
      <a class="whatsapp-btn" id="waBtn" target="_blank">WhatsApp'tan Gönder</a>
      <div class="status-text" id="sendStatus">Konum paylaşımı aktif — sayfayı kapatma</div>
    </div>
  `;

  let mode = 'araba';
  let dur = '15';

  document.getElementById('modeRow').addEventListener('click', e => {
    const opt = e.target.closest('.chip'); if (!opt) return;
    document.querySelectorAll('#modeRow .chip').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
    mode = opt.dataset.mode;
  });
  document.getElementById('durRow').addEventListener('click', e => {
    const opt = e.target.closest('.chip'); if (!opt) return;
    document.querySelectorAll('#durRow .chip').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
    dur = opt.dataset.dur;
  });

  document.getElementById('sendBtn').addEventListener('click', async () => {
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;

    if (!navigator.geolocation) {
      alert('Tarayıcın konum servisini desteklemiyor.');
      btn.disabled = false;
      return;
    }

    navigator.geolocation.getCurrentPosition(async (pos) => {
      const res = await fetch('/api/session', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ duration: dur, mode })
      });
      const data = await res.json();
      if (!data.code) { alert('Bir hata oluştu, tekrar dene.'); btn.disabled=false; return; }

      const link = `${location.origin}${location.pathname}?kod=${data.code}`;
      document.getElementById('shareLink').textContent = link;
      document.getElementById('waBtn').href = `https://wa.me/?text=${encodeURIComponent('Canlı konumumu takip et: ' + link)}`;
      document.getElementById('shareBox').style.display = 'block';

      startTracking(data.code, dur);
    }, () => {
      alert('Konum izni verilmedi. Ayarlardan izin vermen gerekiyor.');
      btn.disabled = false;
    }, { enableHighAccuracy: true });
  });
}

function startTracking(code, durationMinKey) {
  const durationMs = { '15': 15*60*1000, '60': 60*60*1000, '600': 10*60*60*1000 }[durationMinKey];
  const endAt = Date.now() + durationMs;

  const watchId = navigator.geolocation.watchPosition(async (pos) => {
    if (Date.now() > endAt) {
      navigator.geolocation.clearWatch(watchId);
      const st = document.getElementById('sendStatus');
      if (st) st.textContent = 'Süre doldu, paylaşım durdu.';
      return;
    }
    try {
      await fetch(`/api/location/${code}`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ lat: pos.coords.latitude, lon: pos.coords.longitude })
      });
    } catch(e) {}
  }, () => {}, { enableHighAccuracy: true, maximumAge: 5000 });

  setTimeout(() => {
    navigator.geolocation.clearWatch(watchId);
    const st = document.getElementById('sendStatus');
    if (st) st.textContent = 'Süre doldu, paylaşım durdu.';
  }, durationMs);
}

function renderWaiting(code) {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="center-msg">
      Bu kişiyi takip etmek için konum izni vermen gerekiyor.
    </div>
    <button class="permission-btn" id="permBtn">Konumumu Paylaş ve Takip Et</button>
  `;

  document.getElementById('permBtn').addEventListener('click', () => {
    if (!navigator.geolocation) { alert('Tarayıcın konumu desteklemiyor.'); return; }
    navigator.geolocation.getCurrentPosition(async (pos) => {
      await fetch(`/api/destination/${code}`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ lat: pos.coords.latitude, lon: pos.coords.longitude })
      });
      setupPush(code);
      renderTrackingUI(code, pos.coords.latitude, pos.coords.longitude);
    }, () => alert('İzin verilmedi.'), { enableHighAccuracy: true });
  });
}

function renderTrackingUI(code, destLat, destLon) {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="map-wrap"><div id="map"></div></div>
    <div class="metrics">
      <div class="metric">
        <div class="big" id="distVal">—</div>
        <div class="small">mesafe</div>
      </div>
      <div class="metric">
        <div class="big" id="etaVal">—</div>
        <div class="small">tahmini süre</div>
      </div>
    </div>
    <a class="route-btn" id="routeBtn" target="_blank">🧭 Yol Tarifi Al</a>
    <div class="status-text" id="waitStatus">Bağlanılıyor...</div>
  `;

  const map = L.map('map', { zoomControl:false, attributionControl:false }).setView([destLat, destLon], 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

  const destIcon = L.divIcon({ className:'', html:'<div style="width:16px;height:16px;border-radius:50%;background:#3FA796;box-shadow:0 0 0 6px rgba(63,167,150,.25);"></div>', iconSize:[16,16] });
  const travelerIcon = L.divIcon({ className:'', html:'<div style="width:18px;height:18px;border-radius:50%;background:#F2A65A;box-shadow:0 0 0 7px rgba(242,166,90,.3);"></div>', iconSize:[18,18] });

  L.marker([destLat, destLon], { icon: destIcon }).addTo(map);
  let travelerMarker = null;
  let trail = [];
  let trailLine = L.polyline([], { color:'#F2A65A', weight:3, opacity:.6 }).addTo(map);

  async function poll() {
    try {
      const res = await fetch(`/api/status/${code}`);
      if (!res.ok) { document.getElementById('waitStatus').textContent = 'Oturum bulunamadı.'; return; }
      const d = await res.json();

      document.getElementById('distVal').textContent = fmtDistance(d.distance);
      document.getElementById('etaVal').textContent = fmtEta(d.etaMinutes);

      if (d.travelerLoc) {
        const pos = [d.travelerLoc.lat, d.travelerLoc.lon];

        if (!travelerMarker) {
          travelerMarker = L.marker(pos, { icon: travelerIcon }).addTo(map);
        } else {
          travelerMarker.setLatLng(pos);
        }

        const last = trail[trail.length - 1];
        if (!last || last[0] !== pos[0] || last[1] !== pos[1]) {
          trail.push(pos);
          trailLine.setLatLngs(trail);
        }

        const bounds = L.latLngBounds([[destLat, destLon], pos]);
        map.fitBounds(bounds, { padding: [40, 40], maxZoom: 16 });

        document.getElementById('routeBtn').href =
          `https://www.google.com/maps/dir/?api=1&destination=${d.travelerLoc.lat},${d.travelerLoc.lon}&travelmode=${d.mode === 'yaya' ? 'walking' : 'driving'}`;
      }

      const statusEl = document.getElementById('waitStatus');
      if (!d.active) statusEl.textContent = 'Paylaşım süresi doldu.';
      else if (d.etaMinutes != null && d.etaMinutes <= 1) statusEl.textContent = '🔥 Neredeyse geldi!';
      else statusEl.textContent = 'Canlı takip ediliyor';
    } catch(e) {}
  }

  poll();
  setInterval(poll, 4000);
}

async function setupPush(code) {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  try {
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') return;

    const reg = await navigator.serviceWorker.register('/sw.js');
    const keyRes = await fetch('/api/vapid-public-key');
    const { key } = await keyRes.json();
    if (!key) return;

    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(key)
    });

    await fetch(`/api/subscribe/${code}`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ subscription: sub })
    });
  } catch(e) { console.error('Push kurulumu başarısız:', e); }
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}
</script>
</body>
</html>
